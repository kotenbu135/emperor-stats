name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - "data/**"
      - "docs/site-design/mockups/card-preview/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # デプロイゲート: validate-data.yml は並列に走るだけでデプロイを止めないため、
      # build ジョブ冒頭でもデータ検証を実行し、検証エラー時は公開させない（task.md 0-2）
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate emperors.json (deploy gate)
        run: |
          pip install jsonschema
          python3 scripts/validate_emperors.py

      - uses: actions/setup-node@v7
        with:
          node-version: "26.4.0"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Lint & typecheck
        working-directory: site
        run: |
          npm run lint
          npx tsc --noEmit

      - name: Build
        working-directory: site
        run: npm run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
